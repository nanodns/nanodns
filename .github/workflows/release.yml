# ─────────────────────────────────────────────────────────────────────────────
# release.yml  —  Build cross-platform binaries + Docker image on git tag push
#
# Trigger: push of a semver tag  vX.Y.Z
#
# Jobs:
#   1. test         — run full test suite (gate for everything else)
#   2. build        — cross-compile binaries for 6 targets
#   3. docker       — build & push multi-arch image to GHCR
#   4. github-release — create GH release, attach all binaries + checksums
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"   # also pre-releases: v1.2.3-rc1

permissions:
  contents: write        # create releases, upload assets
  packages: write        # push to GHCR
  id-token: write        # cosign keyless signing

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── 1. Gate: run tests before building anything ────────────────────────────
  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all

  # ── 2. Cross-compile binaries ──────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (musl = fully static, runs on any glibc-less distro)
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: nanodns
            archive: nanodns-linux-x86_64.tar.gz

          # Linux aarch64 (musl static — Raspberry Pi, ARM servers)
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: nanodns
            archive: nanodns-linux-aarch64.tar.gz

          # Linux armv7 (musl static — Raspberry Pi 32-bit)
          - target: armv7-unknown-linux-musleabihf
            runner: ubuntu-latest
            artifact: nanodns
            archive: nanodns-linux-armv7.tar.gz

          # macOS x86_64
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: nanodns
            archive: nanodns-macos-x86_64.tar.gz

          # macOS Apple Silicon
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: nanodns
            archive: nanodns-macos-aarch64.tar.gz

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: nanodns.exe
            archive: nanodns-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # cross handles musl cross-compilation transparently via Docker
      - name: Install cross (Linux musl targets)
        if: contains(matrix.target, 'musl')
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-${{ matrix.target }}-

      # Inject version from tag into Cargo.toml at build time (no file edit)
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          # Patch Cargo.toml version so --version matches the tag
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Build (cross — musl)
        if: contains(matrix.target, 'musl')
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo — native)
        if: "!contains(matrix.target, 'musl')"
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Package (tar.gz — Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          strip "$BIN" 2>/dev/null || true
          tar czf "${{ matrix.archive }}" \
            -C "$(dirname $BIN)" "$(basename $BIN)" \
            README.md nanodns.json nanodns.service

      - name: Package (zip — Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target\${{ matrix.target }}\release\${{ matrix.artifact }}"
          Compress-Archive -Path $bin, "README.md", "nanodns.json" `
            -DestinationPath "${{ matrix.archive }}"

      # ── Checksum ─────────────────────────────────────────────────────────────
      - name: SHA-256 checksum (Unix)
        if: runner.os != 'Windows'
        run: sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"

      - name: SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File "${{ matrix.archive }}.sha256" -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          retention-days: 1

  # ── 3. Docker multi-arch image → GHCR ────────────────────────────────────
  docker:
    name: Docker (GHCR)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # vX.Y.Z  →  tag + major.minor + major + latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            # short commit sha for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push multi-arch image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

      # Keyless signing with cosign (Sigstore) — verifiable supply chain
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.docker-build.outputs.digest }}
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"

      - name: Output image digest
        run: echo "Image digest ${{ steps.docker-build.outputs.digest }}"

  # ── 4. GitHub Release + upload all binaries ───────────────────────────────
  github-release:
    name: GitHub Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for changelog generation

      # Download all binary artifacts produced in the build job
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      # Combine all per-file sha256 into one CHECKSUMS.txt
      - name: Merge checksums
        run: |
          cat dist/*.sha256 | sort > dist/CHECKSUMS.txt
          echo "=== CHECKSUMS.txt ==="
          cat dist/CHECKSUMS.txt

      # Auto-generate changelog from commits since last tag
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_FRAGMENT.md
          GITHUB_REPO: ${{ github.repository }}
        continue-on-error: true   # fall back to auto-generated notes if cliff.toml missing

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NanoDNS ${{ github.ref_name }}"
          body_path: ${{ steps.changelog.outputs.changelog != '' && 'CHANGELOG_FRAGMENT.md' || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.changelog == '' }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/CHECKSUMS.txt
          token: ${{ secrets.GITHUB_TOKEN }}

      # Post image digest as release note annotation
      - name: Annotate release with Docker info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ github.ref_name }}"
          gh release edit "$TAG" \
            --notes-start-tag "$TAG" \
            --notes "$(gh release view "$TAG" --json body -q .body)

          ---
          **Docker image** (multi-arch: amd64 / arm64 / arm/v7)
          \`\`\`
          docker pull ${IMAGE}:${TAG#v}
          \`\`\`
          Verify signature:
          \`\`\`
          cosign verify \\
            --certificate-identity-regexp='https://github.com/${{ github.repository }}/.github/workflows/release.yml@refs/tags/.*' \\
            --certificate-oidc-issuer='https://token.actions.githubusercontent.com' \\
            ${IMAGE}:${TAG#v}
          \`\`\`" \
          2>/dev/null || true   # non-fatal if annotation fails
