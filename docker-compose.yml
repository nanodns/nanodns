# Single-node quick start
# For a 3-node cluster, copy the node1 section and adjust IPs / peers.
services:
  nanodns:
    build: .
    image: nanodns:latest
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "9053:9053/tcp"
    volumes:
      - ./nanodns.json:/etc/nanodns/nanodns.json:ro
    cap_add:
      - NET_BIND_SERVICE

